name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, x86]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ matrix.arch }}
      - run: pip install -r requirements.txt pyinstaller
      - run: pyinstaller --onefile --windowed --name Mik4gmon mikrotik_monitor.py
      - uses: actions/upload-artifact@v4
        with:
          name: Mik4gmon-windows-${{ matrix.arch }}
          path: dist/Mik4gmon.exe

  build-android:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/kivy/buildozer:latest
      env:
        LC_ALL: C.UTF-8
        LANG: C.UTF-8
    steps:
      - uses: actions/checkout@v4
      - name: Build with Buildozer
        run: |
          yes 'y' | buildozer android debug 2>&1
      - uses: actions/upload-artifact@v4
        with:
          name: Mik4gmon-android
          path: bin/*.apk
