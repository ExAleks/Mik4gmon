name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, x86]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ matrix.arch }}
      - run: pip install -r requirements.txt pyinstaller
      - run: pyinstaller --onefile --windowed --name Mik4gmon mikrotik_monitor.py
      - uses: actions/upload-artifact@v4
        with:
          name: Mik4gmon-windows-${{ matrix.arch }}
          path: dist/Mik4gmon.exe

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev
          python3 -m pip install --upgrade Cython virtualenv buildozer
      - name: Build with Buildozer
        run: |
          buildozer android debug
      - uses: actions/upload-artifact@v4
        with:
          name: Mik4gmon-android
          path: bin/*.apk
